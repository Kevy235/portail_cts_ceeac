# Déploiement autonome (alternative au mode Application + Database de Dokploy,
# également utilisable en local avec Docker : `docker compose up --build`).
services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://portail_cts:${POSTGRES_PASSWORD:?definir POSTGRES_PASSWORD}@db:5432/portail_cts
      JWT_SECRET: ${JWT_SECRET:?definir JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ceeac-eccas.org}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?definir ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Secrétariat APPS}
      APP_URL: ${APP_URL:-}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "50"
      # Diffusion des rapports par e-mail (optionnel)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      # Lié à l'hôte local uniquement : l'accès public passe par le reverse
      # proxy (Traefik), sinon le rate-limit de connexion serait contournable
      # via un X-Forwarded-For forgé.
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads:/app/uploads

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portail_cts
      POSTGRES_USER: portail_cts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?definir POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portail_cts -d portail_cts"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  pgdata:
