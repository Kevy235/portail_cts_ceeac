name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portail_cts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification TypeScript
        run: npm run typecheck

      - name: Build de production
        run: npm run build

      - name: Test de fumée (API + PostgreSQL)
        run: node scripts/smoke-test.mjs
        env:
          SMOKE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portail_cts_test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t portail-cts:ci .
